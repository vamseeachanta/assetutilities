# Pre-commit configuration for assetutilities
# Install: uv run pre-commit install
# Run manually: uv run pre-commit run --all-files

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  # bandit security scan on staged Python files (WRK-1081)
  - repo: local
    hooks:
      - id: bandit-staged
        name: bandit security scan (staged Python files)
        language: system
        entry: uvx bandit[toml]==1.9.4
        args: [-ll, -c, pyproject.toml, -b, ../config/quality/bandit-baseline-assetutilities.json]
        types: [python]
        exclude: ^tests/

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        # Note: requires workspace-hub parent checkout; ../.gitleaks.toml is hub-relative
        args: [--config, ../.gitleaks.toml]

  # Cross-repo integration gate (WRK-1091): run downstream contract tests on push
  - repo: local
    hooks:
      - id: cross-repo-integration
        name: Cross-repo integration test
        entry: ../scripts/hooks/assetutilities-pre-push.sh
        language: script
        stages: [push]
        pass_filenames: false
        always_run: false
        files: ^src/
