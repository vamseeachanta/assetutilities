basename: file_edit
edit_type: split
concatenate_type: array
default:
  log_level: DEBUG
  config:
    overwrite:
      output: true
input:
- output_filename: 06a_501_section2_def
  output_dir: ~
  filename: ~
  add_blank_file_in_between: false
  input_files: []
split_settings:
- start:
    line_number: ~
    key_words:
    - DECK  0
    transform:
      scale: 1
      shift: -1
