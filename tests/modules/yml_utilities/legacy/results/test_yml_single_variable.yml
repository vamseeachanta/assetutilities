library: assetutlities
basename: yaml_utilities
default:
  log_level: INFO
  config:
    overwrite:
      output: true
file_management:
  flag: false
  files:
    files_in_current_directory:
      flag: false
      auto_read: true
      directory: yml
      file_extensions:
      - yml
      filename_pattern: ~
    output_directory: ~
test_variables:
  flag: true
  method: single
data:
  type: input
  groups:
  - label: test_label
timeout=20: -q
no-header: true
ignore=tests/modules/tests_wip: true
ignore=tests/modules/download_data: true
ignore=tests/modules/web_scraping: true
ignore=tests/modules/pipeline_ci_cd: true
cov=src/assetutilities: true
Analysis:
  basename: yaml_utilities
  analysis_root_folder: /mnt/local-analysis/workspace-hub/assetutilities/tests/modules/yml_utilities/legacy
  file_name: test_yml_single_variable
  file_name_for_overwrite: test_yml_single_variable
  log_folder: /mnt/local-analysis/workspace-hub/assetutilities/tests/modules/yml_utilities/legacy/logs
  start_time: 2026-02-24 10:50:19.355917
  cfg_array_file_names: ~
  DefaultInputFile: ~
  CustomInputFile: /mnt/local-analysis/workspace-hub/assetutilities/tests/modules/yml_utilities/legacy/test_yml_single_variable.yml
  result_folder: /mnt/local-analysis/workspace-hub/assetutilities/tests/modules/yml_utilities/legacy/results
  result_data_folder: /mnt/local-analysis/workspace-hub/assetutilities/tests/modules/yml_utilities/legacy/results/Data
  result_plot_folder: /mnt/local-analysis/workspace-hub/assetutilities/tests/modules/yml_utilities/legacy/results/Plot
  fe_folder: /mnt/local-analysis/workspace-hub/assetutilities/tests/modules/yml_utilities/legacy/results
