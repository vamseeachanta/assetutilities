basename: visualization

# Plot an XY line chart from data embedded in this file.
# Output: results/Plot/x_y_line.png

default:
  log_level: INFO
  config:
    overwrite:
      output: True

settings:
  type: xy
  mode: line
  pairs: False
  multiple: False
  plt_engine: matplotlib
  label: Allowable Wave Height
  file_name: x_y_line
  plt_save_extensions: [".png"]
  title: Allowable Significant Wave Height (Hs)
  xlabel: Direction (deg)
  ylabel: Allowable Wave Height (m)
  legend:
    flag: True
    label: []
    loc: best
    prop: { family: Arial, size: 5 }

master_settings:
  groups: {}

data:
  type: input
  groups:
    - x:
        - [35, 70, 120, 155, 205, 240]
      y:
        - [0.5, 1, 2, 2.5, 3, 4]
        - [1, 2, 2.5, 2.5, 3, 5]
  color: [blue, green]
  alpha: [1, 0.75]
  linestyle: ["--", "-", "-", ":"]
