basename: reportgen

# Generate a Markdown report from inline section definitions.
# project_root + outputs_path determine where the report is written (relative
# to the repo root when run via `uv run python -m assetutilities <this file>`).
# Output: examples/workflows/reportgen/outputs/sample-report.<timestamp>.out.md

important_paths:
  project_root: "examples/workflows/reportgen"
  inputs_path: "inputs"
  assets_path: "assets"
  outputs_path: "outputs"

report_details:
  name: "AssetUtilities Sample Report"
  client_logo: "client-logo.png"
  project_name: "Demo Project"
  project_num: "0001"
  engineer: "AssetUtilities"
  reviewer: "TBD"
  date: "2026/06/13"
  target_file_stub: "sample-report"
  target_report_type: "md"

sections_L1:
  - name: "Overview"
    paragraphs:
      - ["This is a sample report generated by the reportgen workflow."]
      - ["Sections and paragraphs are declared inline in the input YAML."]

  - name: "Results"
    paragraphs:
      - ["A markdown table can be embedded directly:"]
      - [{ "type": "markdown_table",
            "content": "| metric | value |\n|---|---|\n| count | 42 |\n| status | green |" }]

  - name: "Appendix"
    sections_L2:
      - name: "Notes"
        paragraphs:
          - ["Generated as part of the workflow registry examples."]
